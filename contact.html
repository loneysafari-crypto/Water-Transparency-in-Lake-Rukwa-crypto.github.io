<script>
  // ================== YOUR EMAILJS SETTINGS ==================
  emailjs.init({
    publicKey: "YOUR_PUBLIC_KEY_HERE",   // ← MUST REPLACE
  });

  const form = document.getElementById('contactForm');
  const statusMessage = document.getElementById('statusMessage');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    submitBtn.innerHTML = "Sending...";
    submitBtn.disabled = true;
    statusMessage.textContent = "";

    const templateParams = {
      from_name: document.getElementById('cname').value,
      from_email: document.getElementById('cemail').value,
      subject: document.getElementById('csubject').value || "New Contact Message",
      message: document.getElementById('cmessage').value,
      reply_to: document.getElementById('cemail').value
    };

    emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
      .then(() => {
        statusMessage.style.color = "green";
        statusMessage.textContent = "✅ Message sent successfully! Thank you.";
        form.reset();
      })
      .catch((error) => {
        statusMessage.style.color = "red";
        statusMessage.innerHTML = "❌ Failed to send.<br><small>" + (error.text || error) + "</small>";
        console.error('EmailJS Full Error:', error);
      })
      .finally(() => {
        submitBtn.innerHTML = "Send Message";
        submitBtn.disabled = false;
      });
  });
</script>
